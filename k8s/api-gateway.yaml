apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-backends
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for backend to be ready..."
              until nc -z backend-external 8000; do
                echo "Backend is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "Backend is ready!"

              echo "Waiting for ingestor to be ready..."
              until nc -z ingestor 8001; do
                echo "Ingestor is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "Ingestor is ready!"
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
            - containerPort: 443
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: tls-certs
              mountPath: /etc/nginx/ssl
              readOnly: true
      volumes:
        - name: gateway-config
          configMap:
            name: api-gateway-config
        - name: tls-certs
          secret:
            secretName: api-gateway-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
  type: NodePort
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  labels:
    app: api-gateway
    type: nginx-config
data:
  nginx.conf: |
    # ──────────────────────────────────────────────────────────
    # API Gateway — load-balanced reverse proxy for backend + ingestor
    # ──────────────────────────────────────────────────────────

    upstream backend_pool {
        least_conn;
        server backend-external:8000;
        keepalive 32;
    }

    upstream ingestor_pool {
        least_conn;
        server ingestor:8001;
        keepalive 16;
    }

    # ── HTTP server (health checks only) ────────────────────
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint (used by probes)
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server (main traffic) ─────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Gateway health check ────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway","tls":true}';
            add_header Content-Type application/json;
        }

        # ── Ingestor routes ─────────────────────────────────
        # Requests to /ingestor/api/... are rewritten to /api/...
        # and forwarded to the ingestor service.
        location /ingestor/ {
            rewrite ^/ingestor/(.*) /$1 break;

            proxy_pass http://ingestor_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Gateway-Service "ingestor";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;

            # Retry on upstream failure
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ── Backend API routes (catch-all for /api/) ────────
        location /api/ {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Gateway-Service "backend";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;

            # Retry on upstream failure
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ── Default 404 ─────────────────────────────────────
        location / {
            return 404 '{"error":"not found","service":"api-gateway","hint":"Use /api/ for backend or /ingestor/api/ for ingestor"}';
            add_header Content-Type application/json;
        }
    }
